name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
      
      - name: Verify source files
        run: |
          echo "=== App.jsx 확인 (QABA 검색) ==="
          grep -c "QABA" src/App.jsx || echo "❌ QABA 없음 - 잘못된 파일!"
          echo "=== App.jsx 첫 줄 ==="
          head -5 src/App.jsx
      
      - name: Build
        run: npm run build
      
      - name: Verify build output
        run: |
          echo "=== dist/index.html ==="
          cat dist/index.html
          echo ""
          echo "=== dist/assets 목록 ==="
          ls -la dist/assets/
          echo ""
          echo "=== 빌드된 JS에 QABA 검색 ==="
          grep -c "QABA" dist/assets/*.js || echo "❌ 빌드된 JS에 QABA 없음!"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
